<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLACK UP | Digital Brutalism</title>
  <style>
    /* 1. 디자인 토큰 (Figma Variables) */
    :root {
      /* 라이트 모드 기본 설정 */
      --bg-color: #ffffff;
      --text-color: #111111;
      --border-color: #111111;
      --accent-color: #FF3333; /* 폰 레스토프 효과용 포인트 컬러 */

      /* 타이포그래피 스케일 */
      --font-hero: 800 clamp(5rem, 10vw, 8rem)/0.9 'Helvetica Neue', Arial, sans-serif;
      --font-heading: 700 2.5rem/1.2 'Helvetica Neue', Arial, sans-serif;
      --font-body: 400 1rem/1.6 'Helvetica Neue', Arial, sans-serif;

      /* 여백 및 타겟팅 스케일 */
      --spacing-macro: 80px;
      --spacing-micro: 8px;
      --touch-target: 44px; /* 피츠의 법칙 */
    }

    /* 다크 모드 토큰 오버라이드 (빛 번짐 최소화를 위한 #111111 및 #F2F2F2 조합) */
    .dark-mode {
      --bg-color: #111111;
      --text-color: #F2F2F2;
      --border-color: #F2F2F2;
    }

    /* 2. Base Reset & Brutalism Vibe */
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font: var(--font-body);
      letter-spacing: 0.05em;
      transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
      overflow-x: hidden;
    }

    /* 공통 상호작용 요소 초기화 및 피츠의 법칙 적용 */
    button, a {
      all: unset;
      cursor: pointer;
      min-height: var(--touch-target);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-micro) var(--spacing-macro);
      border-bottom: 3px solid var(--border-color);
      flex-wrap: wrap;
    }

    h1.hero-title {
      font: var(--font-hero);
      letter-spacing: -0.05em;
      text-transform: uppercase;
    }

    .theme-toggle {
      border: 2px solid var(--border-color);
      padding: 0 20px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .theme-toggle:hover {
      background-color: var(--text-color);
      color: var(--bg-color);
    }

    /* NAV (힉의 법칙: 패싯 검색 구현) */
    nav {
      padding: var(--spacing-macro);
      border-bottom: 3px solid var(--border-color);
    }

    .main-categories {
      display: flex;
      gap: var(--spacing-micro);
      flex-wrap: wrap;
    }

    .category-btn {
      border: 2px solid var(--border-color);
      padding: 0 24px;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .category-btn.active, .category-btn:hover {
      background-color: var(--text-color);
      color: var(--bg-color);
    }

    .facet-filters {
      display: none; /* 기본 숨김 상태 */
      margin-top: calc(var(--spacing-macro) / 2);
      gap: var(--spacing-micro);
      flex-wrap: wrap;
      padding-top: 20px;
      border-top: 2px dashed var(--border-color);
    }

    .facet-filters.active {
      display: flex; /* 의존 조건 만족 시 노출 */
    }

    .filter-btn {
      text-decoration: underline;
      text-underline-offset: 4px;
      padding: 0 16px;
      font-weight: 500;
    }

    .filter-btn:hover {
      color: var(--accent-color);
      text-decoration-color: var(--accent-color);
    }

    /* MAIN (그리드 레이아웃 및 폰 레스토프 효과) */
    main {
      padding: var(--spacing-macro);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--spacing-macro);
    }

    article.product-card {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-micro);
    }

    .img-placeholder {
      width: 100%;
      aspect-ratio: 3 / 4;
      border: 3px solid var(--border-color);
      position: relative;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(128, 128, 128, 0.1) 10px,
        rgba(128, 128, 128, 0.1) 20px
      );
    }

    /* 사회적 증명 & 시각적 고립 (폰 레스토프 효과) */
    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: var(--accent-color);
      color: #ffffff;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 1.1rem;
      text-transform: uppercase;
      border: 2px solid var(--border-color); 
      z-index: 10;
    }

    .product-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-top: var(--spacing-micro);
    }

    .product-title {
      font: var(--font-heading);
      text-transform: uppercase;
    }

    .product-price {
      font-weight: 700;
      font-size: 1.2rem;
    }

    /* 3. 스크롤 기반 인터랙션 CSS */
    .fade-in {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* 반응형 여백 처리 */
    @media (max-width: 768px) {
      :root {
        --spacing-macro: 40px;
      }
      .product-title {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body class="dark-mode"> <header>
    <h1 class="hero-title">BLACK UP</h1>
    <button class="theme-toggle" id="themeToggle" aria-label="테마 변경">Light Mode</button>
  </header>

  <nav aria-label="메인 카테고리 및 필터">
    <div class="main-categories">
      <button class="category-btn" data-category="outer">OUTER</button>
      <button class="category-btn" data-category="pants">PANTS</button>
      <button class="category-btn" data-category="top">TOP</button>
    </div>
    
    <div class="facet-filters" id="facetPants" aria-label="바지 상세 필터">
      <button class="filter-btn">기장: 롱</button>
      <button class="filter-btn">기장: 숏</button>
      <button class="filter-btn">핏: 와이드</button>
      <button class="filter-btn">핏: 스키니</button>
      <button class="filter-btn">핏: 스트레이트</button>
    </div>
  </nav>

  <main>
    <article class="product-card fade-in">
      <div class="img-placeholder">
        <div class="badge">13만 장 판매</div>
      </div>
      <div class="product-info">
        <h2 class="product-title">Raw Denim 01</h2>
        <span class="product-price">₩54,000</span>
      </div>
    </article>

    <article class="product-card fade-in">
      <div class="img-placeholder"></div>
      <div class="product-info">
        <h2 class="product-title">Zip-up Hoodie</h2>
        <span class="product-price">₩62,000</span>
      </div>
    </article>

    <article class="product-card fade-in">
      <div class="img-placeholder"></div>
      <div class="product-info">
        <h2 class="product-title">Overfit Blazer</h2>
        <span class="product-price">₩128,000</span>
      </div>
    </article>

    <article class="product-card fade-in">
      <div class="img-placeholder"></div>
      <div class="product-info">
        <h2 class="product-title">Nylon Cargo</h2>
        <span class="product-price">₩48,000</span>
      </div>
    </article>
  </main>

  <script>
    // [1] 다크/라이트 모드 테마 전환
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      if (document.body.classList.contains('dark-mode')) {
        themeToggle.textContent = 'Light Mode';
      } else {
        themeToggle.textContent = 'Dark Mode';
      }
    });

    // [2] 힉의 법칙: 패싯 검색 필터 동적 노출 로직
    const categoryBtns = document.querySelectorAll('.category-btn');
    const facetPants = document.getElementById('facetPants');

    categoryBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        // 모든 버튼의 활성화 상태 초기화
        categoryBtns.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');

        // 'PANTS' 카테고리 클릭 시에만 하위 필터 노출
        if (e.target.dataset.category === 'pants') {
          facetPants.classList.add('active');
        } else {
          facetPants.classList.remove('active');
        }
      });
    });

    // [3] 스크롤 기반 인터랙션 (Intersection Observer 활용)
    const observerOptions = {
      root: null,
      rootMargin: '0px',
      threshold: 0.15 // 요소가 15% 보일 때 애니메이션 트리거
    };

    const observer = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          // 애니메이션이 한 번 실행된 후에는 관찰 해제 (성능 최적화)
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);

    // .fade-in 클래스가 붙은 모든 요소에 옵저버 적용
    document.querySelectorAll('.fade-in').forEach(el => {
      observer.observe(el);
    });
  </script>
</body>
</html>
