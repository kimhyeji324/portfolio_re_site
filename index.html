<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK UP - Brutalist E-Commerce</title>
<style>
  /* 1. Figma Variables (디자인 토큰) */
  :root {
    --color-surface-base: #111111;
    --color-text-primary: #F2F2F2;
    --color-text-muted: #8A8A8A;
    --color-accent-vonrestorff: #FF3333;
    
    --spacing-touch-target: 44px;
    --spacing-micro: 8px;
    --spacing-macro: 80px;
    --spacing-faceted-gap: 12px;
    
    --font-hero: 800 5rem/0.9 'Helvetica Neue', Arial, sans-serif;
    --font-heading: 700 2.5rem/1.1 'Helvetica Neue', Arial, sans-serif;
    --font-body: 400 1rem/1.6 'Helvetica Neue', Arial, sans-serif;
    --font-ui: 500 0.875rem/1 'Helvetica Neue', Arial, sans-serif;
  }

  /* 2. Base Reset & Brutalism Vibe */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: var(--color-surface-base);
    color: var(--color-text-primary);
    font: var(--font-body);
    /* 브루탈리즘 특유의 거칠고 딱딱한 그리드 느낌을 위해 전체 테두리 활용 */
    border: 2px solid var(--color-text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  /* HEADER */
  header {
    padding: var(--spacing-micro) var(--spacing-macro);
    border-bottom: 2px solid var(--color-text-primary);
    display: flex;
    justify-content: space-between;
    align-items: center;
    /* 피츠의 법칙: 헤더 영역의 최소 터치 높이 확보 */
    min-height: calc(var(--spacing-touch-target) * 1.5);
  }

  .logo {
    font: var(--font-hero);
    font-size: 3rem; /* 모바일 고려 사이즈 조정 */
    letter-spacing: -0.05em;
    text-transform: uppercase;
  }

  /* NAV (힉의 법칙: 패싯 검색 및 상호 의존적 노출) */
  nav {
    padding: var(--spacing-macro) var(--spacing-macro) var(--spacing-micro);
    border-bottom: 2px solid var(--color-text-primary);
  }

  .nav-categories {
    display: flex;
    gap: var(--spacing-faceted-gap);
    margin-bottom: var(--spacing-macro);
  }

  .category-btn {
    background: transparent;
    color: var(--color-text-primary);
    border: 1px solid var(--color-text-primary);
    font: var(--font-ui);
    text-transform: uppercase;
    cursor: pointer;
    /* 피츠의 법칙: 44px 터치 타겟 보장 */
    min-height: var(--spacing-touch-target);
    padding: 0 24px;
    transition: all 0.2s ease;
  }

  .category-btn:hover, .category-btn.active {
    background: var(--color-text-primary);
    color: var(--color-surface-base);
  }

  .facet-filters {
    display: none; /* 기본적으로 숨김 (선택적 노출) */
    gap: var(--spacing-faceted-gap);
    padding-top: var(--spacing-faceted-gap);
    border-top: 1px dashed var(--color-text-muted);
  }

  .facet-filters.show {
    display: flex;
  }

  .filter-btn {
    background: transparent;
    color: var(--color-text-muted);
    border: none;
    font: var(--font-ui);
    text-decoration: underline;
    text-underline-offset: 4px;
    cursor: pointer;
    /* 피츠의 법칙: 텍스트 링크라도 터치 영역 확장 */
    padding: 12px 0;
    min-height: var(--spacing-touch-target);
  }

  .filter-btn:hover {
    color: var(--color-text-primary);
  }

  /* MAIN (사회적 증명 및 폰 레스토프 효과) */
  main {
    flex: 1;
    padding: var(--spacing-macro);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: var(--spacing-macro);
  }

  .product-card {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-micro);
  }

  .product-image-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    background-color: #222;
    border: 1px solid var(--color-text-muted);
    position: relative;
    overflow: hidden;
  }

  /* 폰 레스토프 효과 (고립 효과) 및 사회적 증명 */
  .social-proof-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background-color: var(--color-accent-vonrestorff);
    color: var(--color-text-primary);
    font: var(--font-ui);
    font-weight: 700;
    padding: 8px 12px;
    text-transform: uppercase;
    /* 대조를 극대화하여 시선 집중 */
  }

  .product-info {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .product-title {
    font: var(--font-heading);
    font-size: 1.5rem;
  }

  .product-price {
    font: var(--font-ui);
    color: var(--color-text-muted);
  }
</style>
</head>
<body>

  <header>
    <div class="logo">BLACK UP</div>
    <a href="#" style="font: var(--font-ui); min-height: var(--spacing-touch-target); display:flex; align-items:center;">CART (0)</a>
  </header>

  <nav>
    <div class="nav-categories">
      <button class="category-btn" onclick="toggleFacets('outer')">OUTER</button>
      <button class="category-btn" onclick="toggleFacets('pants')">PANTS</button>
      <button class="category-btn" onclick="toggleFacets('top')">TOP</button>
    </div>
    
    <div class="facet-filters" id="pants-filters">
      <button class="filter-btn">기장: 롱</button>
      <button class="filter-btn">기장: 숏</button>
      <button class="filter-btn">핏: 와이드</button>
      <button class="filter-btn">핏: 스키니</button>
    </div>
  </nav>

  <main>
    <article class="product-card">
      <div class="product-image-placeholder">
        <div class="social-proof-badge">13만 장 판매 돌파</div>
      </div>
      <div class="product-info">
        <h2 class="product-title">RAW DENIM 01</h2>
        <span class="product-price">₩54,000</span>
      </div>
    </article>

    <article class="product-card">
      <div class="product-image-placeholder"></div>
      <div class="product-info">
        <h2 class="product-title">STRUCTURED BLAZER</h2>
        <span class="product-price">₩128,000</span>
      </div>
    </article>
  </main>

  <script>
    // 힉의 법칙 적용: 선택지를 최소화하고 필요할 때만 노출하는 JS 로직
    function toggleFacets(category) {
      // 모든 카테고리 버튼의 active 상태 해제
      document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
      
      // 모든 필터 영역 숨김
      document.querySelectorAll('.facet-filters').forEach(filter => filter.classList.remove('show'));

      // 클릭한 카테고리에 맞는 필터만 노출 (예시로 PANTS 카테고리만 연동)
      if (category === 'pants') {
        const pantsFilters = document.getElementById('pants-filters');
        if (pantsFilters) {
          pantsFilters.classList.add('show');
          // 현재 클릭된 버튼 활성화 표시
          event.currentTarget.classList.add('active');
        }
      } else {
        event.currentTarget.classList.add('active');
      }
    }
  </script>

</body>
</html>
